name: Update CS2 Data

on:
  schedule:
    # Каждые 6 часов
    - cron: '0 */6 * * *'
  # Позволяет запускать вручную из вкладки Actions
  workflow_dispatch:
  # Запускается при пуше в main
  push:
    branches: [ main ]
    paths:
      - 'scripts/fetch_data.py'

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: |
          pip install --upgrade pip

      - name: Запуск скрипта сбора данных
        env:
          LIQUIPEDIA_API_KEY: ${{ secrets.LIQUIPEDIA_API_KEY }}
        run: |
          python scripts/fetch_data.py

      - name: Проверка изменений
        id: check-changes
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Коммит и пуш обновлённых данных
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: обновление данных $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
